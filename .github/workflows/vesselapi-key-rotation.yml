name: VesselAPI Key Rotation Reminder

on:
  schedule:
    # Run at 9am on the 1st of every 3rd month (~every 80-90 days)
    - cron: "0 9 1 */3 *"
  workflow_dispatch: {}

jobs:
  create-rotation-issue:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create key rotation reminder issue
        run: |
          REPO=$(gh repo view --json nameWithOwner -q .nameWithOwner)

          gh issue create \
            --title "Action required: Rotate VesselAPI API key (90-day expiry)" \
            --body "$(cat <<'EOF'
          ## VesselAPI Key Rotation Required

          > **Warning:** The VesselAPI key may be nearing its 90-day expiry. Please rotate it to avoid service interruption.

          ### Renewal Steps

          1. Log in to [vesselapi.com](https://vesselapi.com) and generate a new API key
          2. Set the new key as a Fly.io secret:
             ```
             flyctl secrets set VESSEL_API_KEY=NEW_KEY_HERE --app project-hammer-api
             ```
          3. Verify the backend redeployed successfully (check the [Fly.io dashboard](https://fly.io/dashboard))
          4. Close this issue

          ---

          > **Note:** If VesselAPI is not configured for this project (no `VESSEL_API_KEY` secret set on Fly.io), close this issue — it is not needed.
          EOF
          )" \
            --repo "$REPO"
