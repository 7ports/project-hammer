# .github/workflows/lighthouse.yml
#
# Runs a Lighthouse audit against the live site on every pull request targeting master.
# Uses treosh/lighthouse-ci-action which handles Chrome installation automatically.
#
# Thresholds (enforced via .github/lighthouse-budget.json):
#   performance  >= 0.75
#   accessibility >= 0.90
#   best-practices >= 0.90
#   pwa          >= 0.90

name: Lighthouse CI

on:
  pull_request:
    branches: [master]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://ferries.yyz.live
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
